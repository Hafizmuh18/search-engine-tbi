services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tbi-tp2-app
    restart: unless-stopped
    expose:
      - "8000:8000"
    volumes:
      - ./collection:/app/collection:ro
      - ./index:/app/index
      - ./tmp:/app/tmp
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  nginx:
    image: nginx:1.25-alpine
    container_name: tbi-tp2-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: tbi-tp2-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    profiles:
      - certbot

networks:
  web:
    driver: bridge